<app-user-header></app-user-header>
<div class="weather-card" *ngIf="stationData as s">

  <h2>{{ s.location }}</h2>

  <div class="temp">
    {{ s.temperature || 31 }}°
    <span>C / F</span>
  </div>

  <p class="condition">☀️ {{ s.status }}</p>

  <div class="days">
    <div class="day" *ngFor="let d of [1,2,3,4,5,6,7]">
      <p>Day</p>
      <p>🌤</p>
      <p>32°</p>
      <p class="low">22°</p>
    </div>
  </div>

</div>
<app-user-footer></app-user-footer>
