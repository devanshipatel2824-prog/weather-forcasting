<app-user-header></app-user-header>

<div class="login-wrapper">

  <div class="login-container">

    <h2>🌤 Weather App Login</h2>
    <p class="subtitle">Login to check weather updates</p>

    <form (ngSubmit)="loginUser()">

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" [(ngModel)]="email" name="email" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Enter password" [(ngModel)]="password" name="password" required>
      </div>

      <button type="submit" class="login-btn">
        Login
      </button>

      <p class="register-text">
        Don't have an account?
        <a routerLink="/user/user-registration">Register</a>
      </p>

    </form>

  </div>

</div>

<app-user-footer></app-user-footer>
