<header class="main-header" [class.scrolled]="isScrolled">

  <!-- TOP HEADER -->
  <div class="top-header">

    <!-- Logo -->
    <div class="logo">
      🌤 WeatherCast
    </div>

    <!-- Login Register -->
    <div class="icons">
      <a routerLink="/user/user-login" class="btn signin-btn">Sign In</a>
      <a routerLink="/user/user-registration" class="btn register-btn">Register</a>
    </div>

  </div>

  <!-- MENU BAR -->
  <div class="menu-bar">

    <a routerLink="/user/user-home">Home</a>
    <a routerLink="/user/weather-search">Weather Search</a>
    <a routerLink="/user/weather-forcast">Forcast</a>
    <a routerLink="/user/history">Search Weather</a>
    <a routerLink="/user/favorites">Favorites</a>
    <a routerLink="/user/about">About</a>
    <a routerLink="/user/contact">Contact</a>

  </div>

</header>
